name: Docker Build & Push
on: 
    workflow_dispatch
jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
          - name: Code checkout
            uses: actions/checkout@v4
          - name: Docker Build
            uses: docker/login-action@v3
            with:
                username: ${{ vars.DOCKERHUB_USERNAME }} #docker username must be same of docker hub.
                password: ${{ secrets.DOCKERHUB_TOKEN }}     

          - name: Debug username
            run: echo "DockerHub user = ${{ vars.DOCKERHUB_USERNAME }}"
          - name: Building & Pushing to Docker Hub
            uses: docker/build-push-action@v6
            with:
                context: .
                push: true
                tags: |
                  ${{ vars.DOCKERHUB_USERNAME }}/flask-app-ecs:${{ github.ref_name }}
                  ${{ vars.DOCKERHUB_USERNAME }}/flask-app-ecs:latest
                  ${{ vars.DOCKERHUB_USERNAME }}/flask-app-ecs:${{ github.sha }}
                    