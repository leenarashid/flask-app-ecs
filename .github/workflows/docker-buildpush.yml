name: Docker Build-Push
on: 
  push:  
    branches: [main]    #To avoid hacking always always run such workflows on push or workflow_dispatch NOT on pull.
jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
          - name: Code checkout
            uses: actions/checkout@v4
          - name: Docker Build
            uses: docker/login-action@v3
            with:
                username: ${{ secrets.DOCKERHUB_USERNAME }} #docker username must be "secret" and value will be same of docker hub username
                password: ${{ secrets.DOCKERHUB_TOKEN }}     

          - name: Debuging username
            run: echo "DockerHub user = ${{ secrets.DOCKERHUB_USERNAME }}"

          - name: Debug Docker tags
            run:  |
              echo "${{ secrets.DOCKERHUB_USERNAME }}/flask-app-ecs:${{ github.ref_name }}, ${{ secrets.DOCKERHUB_USERNAME }}/flask-app-ecs:latest, ${{ secrets.DOCKERHUB_USERNAME }}/flask-app-ecs:${{ github.sha }}"


          - name: Building & Pushing to Docker Hub
            uses: docker/build-push-action@v6
            with:
                context: .
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME }}/flask-app-ecs:${{ github.ref_name }},${{ secrets.DOCKERHUB_USERNAME }}/flask-app-ecs:${{ github.sha }}