name: Docker Build & Push
on: 
    workflow_dispatch
jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
          - name: Code checkout
            uses: actions/checkout@v4
          - name: Docker Build
            uses: docker/login-action@v3
            with:
                username: ${{ vars.DOCKERHUB_USER }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}     


          - name: Build and Push to DockerHub
            uses: docker/build-push-action@v6
            with:
                context: .
                push: true
                tags: |
                    ${{ vars.DOCKERHUB_USER }}/github-actions-repo:${{ github.GITHUB_HEAD_REF }}
                    ${{ vars.DOCKERHUB_USER }}/github-actions-repo:${{github.GITHUB_SHA}}    